name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      # Bun cross-compiles standalone executables for every target from a
      # single host, so one job covers all platforms.
      - name: Compile standalone binaries
        run: |
          set -euo pipefail
          mkdir -p artifacts
          compile() {
            bun build ./src/main.ts --compile --minify --sourcemap \
              --target="$1" --outfile "artifacts/$2"
          }
          compile bun-linux-x64      rstlrx-linux-x64
          compile bun-linux-arm64    rstlrx-linux-arm64
          compile bun-darwin-x64     rstlrx-darwin-x64
          compile bun-darwin-arm64   rstlrx-darwin-arm64
          compile bun-windows-x64    rstlrx-windows-x64.exe

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/rstlrx-linux-x64
            artifacts/rstlrx-linux-arm64
            artifacts/rstlrx-darwin-x64
            artifacts/rstlrx-darwin-arm64
            artifacts/rstlrx-windows-x64.exe
