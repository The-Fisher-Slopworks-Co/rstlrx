name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: rstlrx-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: rstlrx-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: rstlrx-darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: rstlrx-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: rstlrx-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install aarch64 linux cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp "target/${{ matrix.target }}/release/rstlrx.exe" "${{ matrix.artifact }}"
          else
            cp "target/${{ matrix.target }}/release/rstlrx" "${{ matrix.artifact }}"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - run: |
          chmod +x artifacts/rstlrx-linux-x64
          chmod +x artifacts/rstlrx-linux-arm64
          chmod +x artifacts/rstlrx-darwin-x64
          chmod +x artifacts/rstlrx-darwin-arm64

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/rstlrx-linux-x64
            artifacts/rstlrx-linux-arm64
            artifacts/rstlrx-darwin-x64
            artifacts/rstlrx-darwin-arm64
            artifacts/rstlrx-windows-x64.exe
